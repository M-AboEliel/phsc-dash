<style>
  :root{
    --red:#E31E24; --red-dark:#B71419; --black:#1a1a1a; --bg:#f4f5f7;
    --present:#16a34a; --absent:#dc2626; --excused:#f59e0b; --injured:#7c3aed;
    --line:#e5e7eb; --muted:#6b7280; --card:#ffffff;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'Cairo',sans-serif;}
  body{background:var(--bg);color:var(--black);padding-bottom:120px;}

  /* ===== Header ===== */
  header{
    background:linear-gradient(135deg,var(--red),var(--red-dark));
    color:#fff;padding:16px 16px 14px;position:sticky;top:0;z-index:50;
    box-shadow:0 2px 12px rgba(227,30,36,.25);
  }
  .head-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .logo{width:38px;height:38px;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .head-titles{flex:1;min-width:0;}
  .head-titles h1{font-size:16px;font-weight:800;line-height:1.2;}
  .head-titles p{font-size:11px;opacity:.85;font-weight:600;}
  .online{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;opacity:.9;}
  .dot{width:7px;height:7px;border-radius:50%;background:#fca5a5;}
  .dot.on{background:#4ade80;box-shadow:0 0 6px #4ade80;}

  .date-row{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.15);border-radius:10px;padding:8px 10px;}
  .date-row label{font-size:12px;font-weight:700;white-space:nowrap;}
  .date-row input{flex:1;border:none;background:#fff;color:var(--black);border-radius:7px;padding:8px;font-size:14px;font-weight:600;font-family:inherit;}

  /* ===== Summary bar ===== */
  .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:12px 12px 4px;}
  .sum-pill{background:var(--card);border-radius:12px;padding:8px 4px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .sum-pill .n{font-size:20px;font-weight:800;line-height:1;}
  .sum-pill .l{font-size:10px;font-weight:600;color:var(--muted);margin-top:3px;}
  .sum-pill.present .n{color:var(--present);}
  .sum-pill.absent .n{color:var(--absent);}
  .sum-pill.excused .n{color:var(--excused);}
  .sum-pill.injured .n{color:var(--injured);}

  /* ===== Quick actions ===== */
  .quick{display:flex;gap:8px;padding:8px 12px 4px;}
  .quick button{flex:1;border:1.5px solid var(--line);background:var(--card);border-radius:10px;padding:9px;font-size:12px;font-weight:700;color:var(--muted);font-family:inherit;}
  .quick button:active{transform:scale(.97);}

  /* ===== Player list ===== */
  .list{padding:8px 12px;}
  .pcard{background:var(--card);border-radius:14px;padding:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
  .pcard-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .pavatar{width:42px;height:42px;border-radius:50%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;flex-shrink:0;border:2px solid var(--line);}
  .pavatar img{width:100%;height:100%;object-fit:cover;}
  .pinfo{flex:1;min-width:0;}
  .pinfo .pname{font-size:15px;font-weight:700;line-height:1.2;}
  .pinfo .pmeta{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px;}
  .pnum{width:28px;height:28px;border-radius:8px;background:var(--black);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;}

  .status-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
  .sbtn{border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:10px 4px;font-size:12px;font-weight:700;color:var(--muted);font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .12s;}
  .sbtn .ico{font-size:16px;}
  .sbtn:active{transform:scale(.95);}
  .sbtn.on.present{background:var(--present);border-color:var(--present);color:#fff;}
  .sbtn.on.absent{background:var(--absent);border-color:var(--absent);color:#fff;}
  .sbtn.on.excused{background:var(--excused);border-color:var(--excused);color:#fff;}
  .sbtn.on.injured{background:var(--injured);border-color:var(--injured);color:#fff;}

  /* ===== Loading / empty ===== */
  .state{text-align:center;padding:60px 20px;color:var(--muted);}
  .state .big{font-size:40px;margin-bottom:12px;}
  .state p{font-size:14px;font-weight:600;}
  .spinner{width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ===== Toast ===== */
  #toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--black);color:#fff;padding:11px 20px;border-radius:30px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:all .25s;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.3);}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ===== Footer save ===== */
  .footbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);padding:12px 16px;display:flex;gap:10px;align-items:center;z-index:60;box-shadow:0 -2px 12px rgba(0,0,0,.06);}
  .saved-note{flex:1;font-size:11px;color:var(--muted);font-weight:600;}
  .saved-note b{color:var(--present);}
</style>
</head>
<body>

<header>
  <div class="head-top">
    <div class="logo">🌴</div>
    <div class="head-titles">
      <h1>تسجيل الحضور</h1>
      <p>الفريق الأول — سيدات بالم هيلز</p>
    </div>
    <div class="online"><span class="dot" id="dot"></span><span id="onlineTxt">جاري الاتصال…</span></div>
  </div>
  <div class="date-row">
    <label>📅 تاريخ التمرين</label>
    <input type="date" id="sessDate">
  </div>
</header>

<div class="summary">
  <div class="sum-pill present"><div class="n" id="cPresent">0</div><div class="l">حاضرة</div></div>
  <div class="sum-pill absent"><div class="n" id="cAbsent">0</div><div class="l">غائبة</div></div>
  <div class="sum-pill excused"><div class="n" id="cExcused">0</div><div class="l">بعذر</div></div>
  <div class="sum-pill injured"><div class="n" id="cInjured">0</div><div class="l">مصابة</div></div>
</div>

<div class="quick">
  <button onclick="markAll('present')">✓ تحضير الكل</button>
  <button onclick="clearAll()">↺ مسح الكل</button>
</div>

<div class="list" id="list">
  <div class="state"><div class="spinner"></div><p>جاري تحميل اللاعبات…</p></div>
</div>

<div class="footbar">
  <div class="saved-note" id="savedNote">الحفظ تلقائي — كل تغيير بيتسجّل فوراً <b>✓</b></div>
</div>

<div id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAJgvEUtXsQzG1NV2sIvQbVcJNAOBizrm4",
  authDomain: "phsc-dashboard.firebaseapp.com",
  projectId: "phsc-dashboard"
};

const STATUSES = [
  {v:'present', t:'حاضرة', ico:'✓'},
  {v:'absent',  t:'غائبة', ico:'✕'},
  {v:'excused', t:'بعذر',  ico:'📝'},
  {v:'injured', t:'مصابة', ico:'➕'}
];

let db, players = [], sessions = [];
let currentSessionId = null;
let currentDate = '';
let attendance = {};       // local mirror {playerId: status}
let creatingSession = false;

/* ===== Init ===== */
try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  initListeners();
} catch(e){
  console.error(e);
  setOnline(false, 'خطأ في الاتصال');
}

function setOnline(on, txt){
  document.getElementById('dot').classList.toggle('on', !!on);
  document.getElementById('onlineTxt').textContent = txt || (on ? 'متصل' : 'غير متصل');
}

function initListeners(){
  // Players
  db.collection('players').onSnapshot(s => {
    players = s.docs.map(d => ({id:d.id, ...d.data()}));
    players.sort((a,b)=>(a.number||999)-(b.number||999) || (a.name||'').localeCompare(b.name||'','ar'));
    setOnline(true);
    render();
  }, err => { console.warn(err); setOnline(false); });

  // Training sessions
  db.collection('training').onSnapshot(s => {
    sessions = s.docs.map(d => ({id:d.id, ...d.data()}));
    syncToDate();
    render();
  }, err => { console.warn(err); setOnline(false); });
}

/* ===== Date handling ===== */
const dateInput = document.getElementById('sessDate');
const todayStr = new Date().toISOString().slice(0,10);
currentDate = todayStr;
dateInput.value = todayStr;
dateInput.addEventListener('change', () => {
  currentDate = dateInput.value;
  syncToDate();
  render();
});

// Find existing session for currentDate, or reset to fresh (created on first tap)
function syncToDate(){
  const found = sessions.find(s => s.date === currentDate);
  if (found){
    currentSessionId = found.id;
    attendance = Object.assign({}, found.attendance || {});
  } else {
    currentSessionId = null;
    attendance = {};
  }
}

/* ===== Render ===== */
function render(){
  // Summary
  const c = {present:0, absent:0, excused:0, injured:0};
  Object.values(attendance).forEach(v => { if (c[v]!==undefined) c[v]++; });
  document.getElementById('cPresent').textContent = c.present;
  document.getElementById('cAbsent').textContent  = c.absent;
  document.getElementById('cExcused').textContent = c.excused;
  document.getElementById('cInjured').textContent = c.injured;

  const list = document.getElementById('list');

  if (!players.length){
    list.innerHTML = '<div class="state"><div class="big">👥</div><p>مفيش لاعبات مسجّلة في الفريق.<br>ضيفيهم من الداشبورد الأول.</p></div>';
    return;
  }

  list.innerHTML = players.map(p => {
    const cur = attendance[p.id] || '';
    const avatar = p.photoUrl ? `<img src="${p.photoUrl}" alt="">` : '👩';
    const meta = [p.position, p.nationality].filter(Boolean).join(' • ') || 'لاعبة';
    const numBadge = p.number ? `<div class="pnum">${p.number}</div>` : '';
    const btns = STATUSES.map(st => `
      <button class="sbtn ${st.v} ${cur===st.v?'on':''}" onclick="setStatus('${p.id}','${st.v}')">
        <span class="ico">${st.ico}</span>${st.t}
      </button>`).join('');
    return `
      <div class="pcard">
        <div class="pcard-top">
          <div class="pavatar">${avatar}</div>
          <div class="pinfo">
            <div class="pname">${esc(p.name||'بدون اسم')}</div>
            <div class="pmeta">${esc(meta)}</div>
          </div>
          ${numBadge}
        </div>
        <div class="status-grid">${btns}</div>
      </div>`;
  }).join('');
}

function esc(s){ return String(s).replace(/[&<>"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

/* ===== Set status (auto-save) ===== */
async function setStatus(pid, status){
  // toggle off if same
  if (attendance[pid] === status) delete attendance[pid];
  else attendance[pid] = status;
  render();
  await persist();
}

async function markAll(status){
  players.forEach(p => { attendance[p.id] = status; });
  render();
  await persist();
  toast('تم تحضير كل اللاعبات ✓');
}

async function clearAll(){
  attendance = {};
  render();
  await persist();
  toast('تم مسح الحضور');
}

/* ===== Persist to Firestore ===== */
async function persist(){
  if (!db) return;
  try {
    if (currentSessionId){
      await db.collection('training').doc(currentSessionId).update({ attendance });
    } else {
      // create the session for this date once
      if (creatingSession) return;
      creatingSession = true;
      const ref = await db.collection('training').add({
        date: currentDate, note:'', attendance, createdAt: Date.now()
      });
      currentSessionId = ref.id;
      creatingSession = false;
    }
  } catch(e){
    console.error(e);
    creatingSession = false;
    toast('خطأ في الحفظ — جرّبي تاني');
  }
}

/* ===== Toast ===== */
let toastT;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(()=>el.classList.remove('show'), 1800);
}
